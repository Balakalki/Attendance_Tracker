org: aluribalakalki
service: attendance-portal

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-south-1
  stage: dev
  environment:
    MONGODB_URL: ${env:MONGODB_URL}
    SECRET: ${env:SECRET}
    MAIL_USER: ${env:MAIL_USER}
    MAIL_PASS: ${env:MAIL_PASS}
    # Set the ALLOWED_ORIGINS GitHub secret to your real origins, e.g.
    # "http://localhost:5173,https://attendancetracker-abk.vercel.app".
    # The default is empty here (a URL with "://" can't be an inline
    # Serverless default); the app then falls back to localhost.
    ALLOWED_ORIGINS: ${env:ALLOWED_ORIGINS, ''}

functions:
  app:
    handler: handler.handler
    events:
      - http:
          path: /{proxy+}
          method: any
          allowCredentials: true


plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 8000
