name: CI

# Runs on every pull request, and on direct pushes to main.
# Its job is to catch code-quality problems BEFORE they get deployed.
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  backend-quality:
    name: Backend code quality
    runs-on: ubuntu-latest
    defaults:
      run:
        # All commands run inside the backend folder.
        working-directory: attendanceTrackerBakeEnd
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Match the AWS Lambda runtime we deploy to.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: attendanceTrackerBakeEnd/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint
