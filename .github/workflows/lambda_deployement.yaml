name: Deploy Lambda Function

# Continuous Deployment: every push to main that touches the backend
# (or this workflow) ships the latest code to AWS Lambda automatically.
# You can also trigger it by hand from the Actions tab (workflow_dispatch).
on:
  push:
    branches: [ main ]
    paths:
      - 'Attendance_Tracker/attendanceTrackerBakeEnd/**'
      - '.github/workflows/lambda_deployement.yaml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Attendance_Tracker/attendanceTrackerBakeEnd
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Same major version as the Lambda runtime (nodejs22.x).
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Attendance_Tracker/attendanceTrackerBakeEnd/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy with Serverless Framework
        run: npx serverless deploy --verbose
        env:
          # AWS credentials of an IAM user allowed to deploy Lambda/API Gateway.
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Serverless Framework v4 requires an access key (free for personal use).
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          # App env vars baked into the Lambda at deploy time (see serverless.yml).
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          SECRET: ${{ secrets.SECRET }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
